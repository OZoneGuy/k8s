apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: collector
  namespace: open-telemetry
spec:
  config:
    receivers:
      hostmetrics:
        scrapers:
          cpu:
          filesystem:
          memory:
      k8s_cluster:
        allocatable_types_to_report:
          - cpu
          - memory
          - pods
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15

    exporters:
      otlp_grpc:
        endpoint: 192.168.2.10:4317
        tls:
          insecure: true

    service:
      telemetry:
        logs:
          level: "debug"
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter]
          exporters: [otlp_grpc]
        metrics:
          receivers: [hostmetrics,otlp]
          exporters: [otlp_grpc]
