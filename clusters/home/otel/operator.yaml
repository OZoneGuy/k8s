apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: collector
  namespace: open-telemetry
spec:
  serviceAccount: otelcollector
  env:
    - name: K8S_NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIp
  volumes:
    - name: hostfs
      hostPath:
        path: /
  volumeMounts:
    - name: hostfs
      mountPath: /hostfs
      readOnly: true
      mountPropagation: HostToContainer
  mode: daemonset
  config:
    receivers:
      hostmetrics:
        root_path: /hostfs
        scrapers:
          cpu:
          filesystem:
          memory:
      k8s_cluster:
        allocatable_types_to_report:
          - cpu
          - memory
          - pods
      kubeletstats:
        auth_type: "serviceAccount"
        endpoint: "https://${env:K8S_NODE_IP}:10250"
        insecure_skip_verify: true
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
    processors:
      k8s_attributes:
      resourcedetection:
        detectors: [system]
        override: true
      attributes:
        actions:
          - key: host.name
            from_context: resource.attributes["host.name"]
            action: upsert
          - key: collector_role
            value: daemonset-collector
            action: upsert

    exporters:
      otlp_grpc:
        endpoint: 192.168.2.10:4317
        tls:
          insecure: true
    service:
      pipelines:
        metrics:
          receivers: [hostmetrics,otlp,k8s_cluster,kubeletstats]
          processors: [k8s_attributes, resourcedetection, attributes]
          exporters: [otlp_grpc]
