apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: main-pool
  namespace: loadbalancer-system
spec:
  addresses:
    - 192.168.2.100-192.168.2.100
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-adv
  namespace: loadbalancer-system
spec:
  ipAddressPools:
    - main-pool
