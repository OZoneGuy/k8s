apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-store
  namespace: external-secrets
spec:
  provider:
    vault:
      server: "http://192.168.2.10:8200"
      path: k8s/home
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes/
          role: eso-role
          serviceAccountRef:
            name: external-secrets-eso-release
            audiences:
              - vault
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: test-secret
  namespace: external-secrets
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: vault-store
    kind: SecretStore
  target:
    name: test-secret # The name of the secret created in K8s
    creationPolicy: Owner
  data:
    - secretKey: data
      remoteRef:
        key: k8s/home/test
        property: data
