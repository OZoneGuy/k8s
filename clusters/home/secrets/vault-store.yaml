apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-store
  namespace: external-secrts
spec:
  provider:
    vault:
      server: "http://192.168.2.10:8200"
      path: k8s/home
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso-role
          serviceAccountRef:
            name: vault-reviewer
            namespace: external-secrets
