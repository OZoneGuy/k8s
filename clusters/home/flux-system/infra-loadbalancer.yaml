apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-loadbalancer
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/home/infrastructure/loadbalancer
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: namespaces
    - name: helm-releases
      readyExpr: |
        status.conditions.find(c, c.type == 'Ready' && c.status == 'True') != null
