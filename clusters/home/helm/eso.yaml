---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: eso-repository
  namespace: helm
spec:
  interval: 15m
  url: https://charts.external-secrets.io

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: eso-release
  namespace: helm
spec:
  interval: 15m
  timeout: 5m
  targetNamespace: external-secrets
  chart:
    spec:
      chart: external-secrets
      sourceRef:
        kind: HelmRepository
        name: eso-repository
      interval: 5m
